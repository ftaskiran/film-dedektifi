<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MovieSherlock | Teknik Analiz Merkezi</title>
    <meta name="description" content="MovieSherlock ile borsa ve film dünyasında derinlemesine analiz.">
    <style>
        /* Ekranın tamamını kaplaması için gerekli ayarlar */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Çift kaydırma çubuğunu engeller */
            background-color: #0e1117; /* Streamlit koyu tema rengi */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Streamlit uygulamanı buraya gömüyoruz -->
    <iframe 
        src="https://moviesherlock.streamlit.app/?embed=true" 
        allow="camera;microphone;clipboard-read;clipboard-write;"
        allowfullscreen>
    </iframe>
</body>
</html>
